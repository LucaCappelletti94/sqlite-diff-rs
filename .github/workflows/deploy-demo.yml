name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "examples/web-demo/**"
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/deploy-demo.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build wasm bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2

      - name: Install dioxus-cli
        uses: taiki-e/install-action@v2
        with:
          tool: dioxus-cli@0.7.9

      # Served at the root of the custom domain chat.luca.phd, so the
      # bundle is built for "/" (no project-pages base path).
      - name: Build web-demo
        run: dx build --release --platform web -p web-demo

      # Tell GitHub Pages to serve the artifact on the custom domain. The
      # CNAME must live in the published artifact so the Actions-based
      # deployment does not clear the domain on each run.
      - name: Write CNAME for custom domain
        run: echo 'chat.luca.phd' > target/dx/web-demo/release/web/public/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/dx/web-demo/release/web/public

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
